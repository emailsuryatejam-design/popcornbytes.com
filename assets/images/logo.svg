<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" width="220" height="44" role="img" aria-label="PopcornBytes">
  <title>PopcornBytes</title>

  <!-- Popcorn bucket icon -->
  <g transform="translate(1,1)">
    <!-- Popcorn kernels popping out -->
    <circle cx="7"  cy="10" r="6"   fill="#e63946"/>
    <circle cx="20" cy="5"  r="7"   fill="#ff5562"/>
    <circle cx="33" cy="10" r="6"   fill="#e63946"/>

    <!-- Bucket rim -->
    <rect x="2" y="14" width="36" height="6" rx="2" fill="#c8202c"/>

    <!-- Bucket body (trapezoid via polygon) -->
    <polygon points="4,20 7,42 33,42 36,20" fill="#e63946"/>

    <!-- Centre stripe -->
    <line x1="20" y1="20" x2="20" y2="42" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>

    <!-- Left stripe -->
    <line x1="12" y1="20" x2="10" y2="42" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  </g>

  <!-- Wordmark -->
  <text
    x="50" y="30"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="21"
    letter-spacing="-0.3"
    fill="#ffffff">Popcorn<tspan fill="#e63946">Bytes</tspan></text>
</svg>
