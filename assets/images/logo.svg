<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 52" width="280" height="52">
  <defs>
    <style>
      .logo-wordmark { font-family: 'Georgia', serif; font-weight: 700; fill: #ffffff; }
      .logo-dot { fill: #e63946; }
      .logo-tag { font-family: 'Arial', sans-serif; font-weight: 400; fill: rgba(255,255,255,0.6); letter-spacing: 0.08em; }
    </style>
  </defs>
  <!-- Popcorn icon - simple stylised kernel -->
  <g transform="translate(0, 4)">
    <circle cx="14" cy="14" r="5" fill="#e63946" opacity="0.9"/>
    <circle cx="22" cy="10" r="4" fill="#e63946" opacity="0.75"/>
    <circle cx="8"  cy="10" r="4" fill="#e63946" opacity="0.75"/>
    <rect x="6" y="17" width="22" height="16" rx="3" fill="#e63946" opacity="0.9"/>
    <line x1="17" y1="17" x2="17" y2="33" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  </g>
  <!-- Wordmark -->
  <text x="40" y="24" class="logo-wordmark" font-size="20">Popcorn<tspan fill="#e63946">Bytes</tspan></text>
  <!-- Tagline -->
  <text x="40" y="40" class="logo-tag" font-size="9">CLAUDE AI &amp; THE FUTURE OF WORK</text>
</svg>
